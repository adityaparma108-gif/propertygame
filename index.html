<!DOCTYPE html>
<html>
<head>
  <title>Business Game Login</title>
</head>

<body style="text-align:center; margin-top:100px; font-family:Arial;">

<h1>Login</h1>

<input type="text" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyAjF0JU3E2OrDBrdhfiWDkpe9-6XMC6iNw",
  authDomain: "robot-920c8.firebaseapp.com",
  databaseURL: "https://robot-920c8-default-rtdb.firebaseio.com",
  projectId: "robot-920c8",
  storageBucket: "robot-920c8.appspot.com",
  messagingSenderId: "423952034510",
  appId: "1:423952034510:web:d7c9b3401814be705fbe9f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.login = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const snapshot = await get(ref(db, "users"));

  if (snapshot.exists()) {
    let users = snapshot.val();
    let found = false;

    for (let key in users) {
      if (
        users[key].email === email &&
        users[key].password == password
      ) {
        found = true;
        localStorage.setItem("player", email);
        break;
      }
    }

    if (found) {
      alert("Login Success ✅");
      window.location.href = "game.html";
    } else {
      alert("Wrong Email or Password ❌");
    }
  } else {
    alert("No users found ❌");
  }
};
</script>

</body>
</html>
