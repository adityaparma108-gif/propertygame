<!DOCTYPE html>
<html>
<head>
  <title>Pro Property Game</title>

  <style>
    body { font-family: Arial; text-align: center; background:#111; color:white; }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 80px);
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .tile {
      width: 80px;
      height: 80px;
      background: #333;
      border-radius: 10px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      font-size:10px;
    }

    button {
      padding:10px;
      margin:5px;
      border:none;
      border-radius:10px;
      background:#4CAF50;
      color:white;
    }
  </style>
</head>

<body>

<h1>🏦 PRO PROPERTY GAME</h1>
<h3 id="playerName"></h3>

<button onclick="joinGame()">Join</button>
<button onclick="rollDice()">🎲 Roll</button>
<button onclick="buyProperty()">🏠 Buy</button>

<h3 id="turnText">Waiting...</h3>

<div class="board" id="board"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "PASTE_YOUR_API_KEY",
  authDomain: "robot-920c8.firebaseapp.com",
  databaseURL: "https://robot-920c8-default-rtdb.firebaseio.com",
  projectId: "robot-920c8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const player = localStorage.getItem("player");
document.getElementById("playerName").innerText = "Player: " + player;

// TURN LISTENER
onValue(ref(db, "turn"), (snap) => {
  const turn = snap.val();
  document.getElementById("turnText").innerText = turn ? "Turn: " + turn : "Waiting...";
});

// BOARD
const cities = [
  "Start","Mumbai","Delhi","Tax","Bangalore",
  "Chennai","Jail","Kolkata","Hyderabad","Bonus",
  "Pune","Jaipur","Lucknow","Tax","Goa",
  "Indore","Nagpur","Bonus","Surat","End"
];

const boardDiv = document.getElementById("board");
cities.forEach((city,i)=>{
  let d = document.createElement("div");
  d.className="tile";
  d.id="tile"+i;
  d.innerHTML = city;
  boardDiv.appendChild(d);
});

// JOIN
window.joinGame = async function () {

  if(!player){
    alert("Login missing!");
    return;
  }

  await set(ref(db,"players/"+player),{
    name:player,
    money:5000,
    position:0
  });

  const turnSnap = await get(ref(db,"turn"));
  if(!turnSnap.exists()){
    await set(ref(db,"turn"), player);
  }

  alert("Joined!");
};

// ROLL
window.rollDice = async function () {

  const turnSnap = await get(ref(db,"turn"));
  const currentTurn = turnSnap.val();

  if(currentTurn !== player){
    alert("Not your turn!");
    return;
  }

  let dice = Math.floor(Math.random()*6)+1;

  const snap = await get(ref(db,"players/"+player));
  let p = snap.val();

  let newPos = (p.position + dice) % 20;

  await update(ref(db,"players/"+player),{
    position:newPos
  });

  await checkProperty(newPos);

  const playersSnap = await get(ref(db,"players"));
  let players = Object.keys(playersSnap.val());
  let next = players[(players.indexOf(player)+1)%players.length];

  await set(ref(db,"turn"), next);

  alert("Dice: " + dice);
};

// BUY
window.buyProperty = async function () {

  const snap = await get(ref(db,"players/"+player));
  let p = snap.val();
  let pos = p.position;

  const propSnap = await get(ref(db,"properties/"+pos));

  if(!propSnap.exists() && p.money >= 500){

    await set(ref(db,"properties/"+pos),{
      owner:player
    });

    await update(ref(db,"players/"+player),{
      money:p.money - 500
    });

    alert("Bought " + cities[pos]);
  }
};

// RENT
async function checkProperty(pos){

  const propSnap = await get(ref(db,"properties/"+pos));

  if(propSnap.exists()){
    let prop = propSnap.val();

    if(prop.owner !== player){

      const snap = await get(ref(db,"players/"+player));
      let p = snap.val();

      await update(ref(db,"players/"+player),{
        money:p.money - 200
      });

      alert("Paid Rent ₹200");
    }
  }
}

// LIVE UPDATE
onValue(ref(db,"players"), (snap)=>{

  document.querySelectorAll(".tile").forEach(t=>t.innerHTML="");

  let data = snap.val();

  if(!data) return;

  for(let k in data){
    let p = data[k];
    let tile = document.getElementById("tile"+p.position);

    tile.innerHTML = cities[p.position] + "<br>🟡";
  }
});

</script>

</body>
</html>
